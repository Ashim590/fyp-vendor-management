services:
  - type: web
    name: paropakar-vendornet-api
    env: node
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_ORIGINS
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ESEWA_MODE
        sync: false
      - key: ESEWA_PRODUCT_CODE
        sync: false
      - key: ESEWA_SECRET_KEY
        sync: false
