name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Backend — install & TypeScript build
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Frontend — install & Vite build
        working-directory: frontend
        run: |
          npm ci
          npm run build
